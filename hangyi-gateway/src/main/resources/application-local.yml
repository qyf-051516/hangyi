spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  cloud:
    nacos:
      discovery:
        enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: employee-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/employees/**, /api/groups/**, /api/qualifications/**, /api/aircraft-types/**, /api/preferences/**
        - id: schedule-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/schedules/**, /api/schedule-changes/**, /api/shifts/**
        - id: flight-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/flights/**
        - id: leave-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/leaves/**
        - id: dashboard-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/dashboard/**
        - id: ai-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/ai/**
