server:
  port: 8086
spring:
  application:
    name: hangyi-dashboard
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  data:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    com.qyf.hangyi.dashboard: debug

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      discovery:
        enabled: false
    openfeign:
      client:
        config:
          hangyi-employee:
            url: http://localhost:8082
          hangyi-schedule:
            url: http://localhost:8083
          hangyi-flight:
            url: http://localhost:8084
          hangyi-leave:
            url: http://localhost:8085
