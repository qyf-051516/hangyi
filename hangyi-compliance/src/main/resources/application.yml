server:
  port: 8096
spring:
  application:
    name: hangyi-compliance
  datasource:
    url: jdbc:mysql://localhost:3306/hangyi_scheduling?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
logging:
  level:
    com.qyf.hangyi.compliance: debug

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      discovery:
        enabled: false
