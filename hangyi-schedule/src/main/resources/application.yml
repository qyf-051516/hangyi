server:
  port: 8083
spring:
  application:
    name: hangyi-schedule
  datasource:
    url: jdbc:mysql://localhost:3306/hangyi_scheduling?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qyf.hangyi.schedule.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
timefold:
  solver:
    termination:
      spent-limit: 30s
    environment-mode: REPRODUCIBLE
logging:
  level:
    com.qyf.hangyi.schedule: debug

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      discovery:
        enabled: false
    openfeign:
      client:
        config:
          hangyi-employee:
            url: http://localhost:8082
          hangyi-flight:
            url: http://localhost:8084
          hangyi-qualification:
            url: http://localhost:8082
